      <a id="grabPubUrl" style="display: none;" href="https://memboxpub-qo1gff2e.s3.eu-north-1.amazonaws.com/ui"></a>
        <div class="v2-footer-newsletter">
            <h2 class="v2-footer-newsletter-title" data-t="newsletter_title">Subscribe to our Weekly Digital Memory Newsletter</h2>
            <form class="v2-footer-newsletter-form"><input class="v2-footer-newsletter-input" data-t-placeholder="newsletter_placeholder" placeholder="Enter your email"
                    type="email"><button type="submit" class="v2-footer-newsletter-btn" aria-label="Subscribe"><img class="footer-icon" src="https://memboxpub-qo1gff2e.s3.eu-north-1.amazonaws.com/ui/assets/footer/arrow-right.svg" alt=""></button><p class="v2-footer-description v2-ftr-form-desc"></p></form>
        </div>
        <div class="v2-footer-content">
            <div class="v2-footer-brand"><a class="v2-footer-logo" href="/" data-discover="true">
                    <div class="v2-footer-logo-icon"><img class="footer-icon" src="https://memboxpub-qo1gff2e.s3.eu-north-1.amazonaws.com/ui/assets/header/logo.svg" alt=""></div><span
                        class="v2-footer-logo-text">addmoments</span>
                </a>
                <p class="v2-footer-description" data-t="footer_description">The easiest way to collect photos from your guests. Create a digital album for your special events without any app downloads.</p>
                <div class="v2-footer-social"></div>
            </div>

                class="v2-footer-lang-selector"
            >
                <img class="footer-icon" src="https://memboxpub-qo1gff2e.s3.eu-north-1.amazonaws.com/ui/assets/footer/globe.svg" alt="">
                <select id="langSel2">
                  <option value="en">EN</option>
                  <option value="uk">UA</option>
                </select>
            </button>
        </div>
    </footer>

<script defer>
(()=>{
  const setUpFooter = (t = (k)=>k)=>{
    const footerLinks = [
      { key: "services_prices", href: "/events/new" },
      { key: "how_it_works", href: "/how-it-works" },
      { key: "blog", href: "/blog" },
      { key: "faq", href: "/faq" },
      { key: "contact_us", href: "/contact-us" }
    ];

    const footerSocials = [
      { icon: "globe.svg", href: "https://www.addmoments.com", ariaKey: "aria_website" },
      { icon: "mail.svg", href: "mailto:info@addmoments.com", ariaKey: "aria_email" }
    ]

    const root = document.querySelector("footer.v2-footer");
    const qs = (query) => root.querySelector(query);
  
    const linksContainer = qs(".v2-footer-links");
    
    footerLinks.forEach(link => {
      linksContainer.innerHTML += `<li><a class="v2-footer-link" href="${link.href}">${t(link.key)}</a></li>`;
    });
  
    const socialsContainer = qs(".v2-footer-social");
    const publicUrl = qs("#grabPubUrl").href;
  
    const footerAssetRoot = publicUrl +"/assets/footer/";
    
    footerSocials.forEach(social => {
      socialsContainer.innerHTML += `<a href="${social.href}" class="v2-footer-social-link" aria-label="${t(social.ariaKey)}"><img class="footer-icon" src="${footerAssetRoot}${social.icon}" alt=""></a>`;
    });
  
    const addEvent = (query, event, listener)=>(qs(query).addEventListener(event, listener));
  
    addEvent(".v2-footer-newsletter-form", "submit", (e)=>{
      e.preventDefault();
      const desc = qs(".v2-ftr-form-desc");
      const email = qs(".v2-footer-newsletter-input").value;
  
      desc.innerText = t("newsletter_loading");
      desc.style.color = "";
  
      let msg="";
      let color = "";
  
      fetch("https://serv.addmoments.com.ua/api/form/newsletter", {
        method: "POST",
        body: JSON.stringify({ email }),
      }).then(async (res)=>{
        if (!res.ok){
          const error = await res.text();
          throw new Error(error);
        }
        msg = t("newsletter_success");
        color = "rgb(87, 181, 63)";
      }).catch((err)=>{
        msg = t("newsletter_error_prefix") + err.message + t("newsletter_error_suffix");
        color = "#dc2626";
      }).finally(()=>{
        desc.style.color = color;
        desc.innerText = msg;
      })

    });
  
  };

  const setUpHeader = (t = (k)=>k)=>{
    let isFirst = false;

    const headerBtnsSetup = ()=>{
      const isAdmin = window.location.pathname.startsWith("/event/") ? 1 : 0;

      const btns = document.querySelectorAll('[data-pub]');
      btns.forEach(btn=>{
        if (btn.getAttribute('data-pub') == isAdmin){
          btn.style.display = 'none';
        } else {
          btn.style.display = 'block';
        }
      });
    }
    
    headerBtnsSetup();
    window.addEventListener('routechange', ()=>{
      if (!isFirst){
        isFirst = true;
        return;
      }
      headerBtnsSetup();
    });


    const headerLinks = {
      left: [
        { key: "services_prices", href: "/events/new" },
        { key: "how_it_works", href: "/how-it-works" }
      ],
      right: [
        { key: "blog", href: "/blog" },
        { key: "faq", href: "/faq" },
        { key: "contact_us", href: "/contact-us" }
      ],
    };
    const headerAssetRoot = "https://memboxpub-qo1gff2e.s3.eu-north-1.amazonaws.com/ui/assets/header/";
    const root = document.querySelector("nav.v2-header");
    const qs = (query)=>(root.querySelector(query));
    const addEvent = (query, event, listener)=>(qs(query).addEventListener(event, listener));

    const appendHeaderLink = (key, href, section)=>{
      const text = t(key);
      const ref = qs(`.v2-header-section.${section}`);
      const mobile = qs(`#mobile-links`);
      ref.innerHTML += `<a class="v2-header-nav-link" href="${href}" data-discover="${key}">${text}</a>`;
      mobile.innerHTML += `<a class="v2-header-nav-link" href="${href}" data-discover="${key}">${text}</a>`;
    }

    ["left", "right"].forEach(section=>{
      headerLinks[section].forEach(link=>{
        appendHeaderLink(link.key, link.href, section);
      });
    });

    const isMobileMenuOpen = ()=>{
      return qs('.v2-header-mobile-menu').classList.contains('open');
    }
    const handleMobileToggle = ()=>{
      const menuOpen = isMobileMenuOpen();
      qs('.v2-header-mobile-menu').classList[menuOpen ? 'remove' : 'add']('open');
      const toggleIcon = qs('.v2-header-mobile-toggle .header-icon');
      qs('.v2-header-mobile-toggle .header-icon').src = headerAssetRoot + (!menuOpen ? 'cross.svg' : 'burger.svg');
    }
    addEvent('.v2-header-mobile-toggle', 'click', handleMobileToggle);
  }

  const makeT = async (lang)=>{
    const langJson = `https://memboxpub-qo1gff2e.s3.eu-north-1.amazonaws.com/ui/assets/lang/${lang}-headfoot.json`;
    const langData = await fetch(langJson).then(res => res.json());
    const t = k => langData[k] || k;
    return t;
  }

  const setUpAll = async (lang)=>{
    const t = await makeT(lang);
    setUpFooter(t);
    setUpHeader(t);

    document.querySelectorAll('[data-t]').forEach(elem => {
      const key = elem.getAttribute('data-t');
      elem.textContent = t(key);
    });

    document.querySelectorAll('[data-t-placeholder]').forEach(elem => {
      const key = elem.getAttribute('data-t-placeholder');
      elem.placeholder = t(key);
    });

    const langSelectors = [
      document.querySelector('#langSel'),
      document.querySelector('#langSel2'),
    ];

    const currLang = t("lang_code");

    langSelectors.forEach(selector => {
      selector.value = currLang;
    });
  }

  const isWordPress = typeof window.wp !== 'undefined';

  if (!isWordPress){
    if (window["currLng"]){
      setUpAll(window["currLng"]);
    } else {
      const cap = window["onLng"] || (()=>{});
      window["onLng"] = (lang)=>{
        cap(lang);
        setUpAll(lang);
      }
    }
    return;
  }

  setUpAll("en");
})()
</script>
